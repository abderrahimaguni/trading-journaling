<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sites Swaq</title>
<style>
  :root{
    --bg: #0B0E11;
    --surface: #12161B;
    --surface-2: #181D24;
    --border: #232A33;
    --text: #E8EAED;
    --text-dim: #7C8693;
    --accent: #1FD9A6;
    --accent-dim: #0E5B47;
    --gold: #E8A33D;
    --danger: #E5484D;
    --font-display: 'IBM Plex Mono', 'Courier New', monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background: transparent;
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  .wrap{
    max-width: 920px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* Header */
  .ticker-strip{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ticker-strip .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }

  h1{
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
  }

  /* Grid */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }

  .card{
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover{
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px -8px rgba(31,217,166,0.25);
  }
  .card:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .icon-box{
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .icon-box img{
    width: 26px; height: 26px;
    border-radius: 4px;
  }
  .icon-fallback{
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .site-name{
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    word-break: break-word;
  }
  .site-domain{
    font-family: var(--font-display);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .del-btn{
    position:absolute;
    top: 6px; right: 6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display:flex; align-items:center; justify-content:center;
    font-size: 11px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    cursor: pointer;
  }
  .card:hover .del-btn{ opacity: 1; }
  .del-btn:hover{ color: var(--danger); border-color: var(--danger); }

  /* Add card */
  .add-card{
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
  }
  .add-card:hover{
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 6px 24px -8px rgba(232,163,61,0.25);
  }
  .add-card .icon-box{
    background: transparent;
    border: 1px dashed var(--border);
  }
  .add-card:hover .icon-box{ border-color: var(--gold); }
  .add-plus{ font-size: 22px; font-weight: 300; }

  /* Add form (inline panel) */
  .add-panel{
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--accent-dim);
    border-radius: 10px;
    padding: 16px;
    display: none;
    gap: 10px;
    flex-direction: column;
  }
  .add-panel.open{ display: flex; }
  .add-panel label{
    font-family: var(--font-display);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .add-panel input{
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font-body);
  }
  .add-panel input:focus{
    outline: none;
    border-color: var(--accent);
  }
  .panel-row{ display:flex; gap: 10px; }
  .panel-row > div{ flex: 1; }
  .panel-actions{
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .btn{
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 9px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-primary{
    background: var(--accent);
    border-color: var(--accent);
    color: #06231C;
    font-weight: 700;
  }
  .btn-primary:hover{ opacity: 0.9; }
  .btn-ghost:hover{ border-color: var(--text-dim); }

  .hint{
    font-size: 11px;
    color: var(--text-dim);
    margin-top: -2px;
  }

  .empty{
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  .loading{
    grid-column: 1/-1;
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 12px;
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-strip .dot{ animation: none; }
    .card{ transition: none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="ticker-strip"><span class="dot"></span> WATCHLIST · MARCHÉS FINANCIERS</div>
  <h1>Dashboard dyal les sites</h1>
  <p class="sub">Zid link, kayt7awel l icone b smiya dyal site. Cliqui 3la l icone bach tefte7 site f tab jdid.</p>

  <div class="grid" id="grid">
    <div class="loading" id="loading">⟳ Kantcharjiw les sites dyalek…</div>
  </div>
</div>

<script>
  const grid = document.getElementById('grid');
  let sites = [];
  let loaded = false;

  function domainFromUrl(url){
    try{
      const u = new URL(url);
      return u.hostname.replace(/^www\./, '');
    }catch(e){
      return url;
    }
  }

  function prettyName(domain){
    const base = domain.split('.')[0];
    return base.charAt(0).toUpperCase() + base.slice(1);
  }

  function faviconUrl(domain){
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
  }

  const PALETTE = [
    '#1FD9A6', // teal
    '#E8A33D', // gold
    '#4D9DE0', // blue
    '#E5484D', // coral red
    '#B66DFF', // violet
    '#F2547D', // pink
    '#7ED957', // lime
    '#FF8A3D', // orange
    '#33C9DC', // cyan
    '#C9A227'  // amber
  ];

  function colorForDomain(domain){
    let hash = 0;
    for(let i = 0; i < domain.length; i++){
      hash = (hash * 31 + domain.charCodeAt(i)) >>> 0;
    }
    return PALETTE[hash % PALETTE.length];
  }

  function hexToRgba(hex, alpha){
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  async function loadSites(){
    try{
      const raw = localStorage.getItem('dashboard_sites');
      sites = raw ? JSON.parse(raw) : [];
    }catch(e){
      sites = [];
    }
    loaded = true;
    render();
  }

  async function saveSites(){
    try{
      localStorage.setItem('dashboard_sites', JSON.stringify(sites));
    }catch(e){
      console.error('Storage error', e);
    }
  }

  function openAddPanel(){
    closeAddPanel();
    const panel = document.createElement('div');
    panel.className = 'add-panel open';
    panel.id = 'addPanel';
    panel.innerHTML = `
      <div class="panel-row">
        <div>
          <label>Lien dyal site (URL)</label>
          <input type="text" id="urlInput" placeholder="https://www.tradingview.com" autofocus>
        </div>
      </div>
      <div class="panel-row">
        <div>
          <label>Smiya (facultatif, ghadi tetla9a automatiquement)</label>
          <input type="text" id="nameInput" placeholder="Smiya dyal site">
        </div>
      </div>
      <div class="panel-actions">
        <button class="btn btn-primary" id="saveBtn">+ Zid</button>
        <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      </div>
      <div class="hint" id="errHint"></div>
    `;
    grid.appendChild(panel);

    document.getElementById('cancelBtn').addEventListener('click', closeAddPanel);
    document.getElementById('saveBtn').addEventListener('click', handleAdd);
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') handleAdd();
    });
    document.getElementById('urlInput').focus();
  }

  function closeAddPanel(){
    const existing = document.getElementById('addPanel');
    if(existing) existing.remove();
  }

  function handleAdd(){
    const urlInput = document.getElementById('urlInput');
    const nameInput = document.getElementById('nameInput');
    const errHint = document.getElementById('errHint');
    let raw = urlInput.value.trim();
    if(!raw){
      errHint.textContent = 'Khasse t-dkhel link f had khana.';
      return;
    }
    if(!/^https?:\/\//i.test(raw)){
      raw = 'https://' + raw;
    }
    let domain;
    try{
      domain = domainFromUrl(raw);
      if(!domain.includes('.')) throw new Error('bad');
    }catch(e){
      errHint.textContent = 'Had link makhdamch, t2ekked menno 3afak.';
      return;
    }
    const name = nameInput.value.trim() || prettyName(domain);
    sites.push({ id: Date.now().toString(), url: raw, domain, name });
    saveSites();
    closeAddPanel();
    render();
  }

  function deleteSite(id, evt){
    evt.stopPropagation();
    sites = sites.filter(s => s.id !== id);
    saveSites();
    render();
  }

  function render(){
    grid.innerHTML = '';

    if(!loaded){
      grid.innerHTML = '<div class="loading">⟳ Kantcharjiw les sites dyalek…</div>';
      return;
    }

    if(sites.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'Mazal ma 3endekch sites. Cliqui 3la "+" bach tzid l awwal wahed 👇';
      grid.appendChild(empty);
    }

    sites.forEach(site => {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      const color = colorForDomain(site.domain);
      const bg = hexToRgba(color, 0.14);
      card.innerHTML = `
        <button class="del-btn" title="Mse7" aria-label="Mse7 ${site.name}">✕</button>
        <div class="icon-box" style="background:${bg}; border-color:${hexToRgba(color, 0.45)};">
          <img src="${faviconUrl(site.domain)}" alt="" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=icon-fallback style=color:${color}>${site.name.charAt(0).toUpperCase()}</span>'">
        </div>
        <div class="site-name">${escapeHtml(site.name)}</div>
        <div class="site-domain">${escapeHtml(site.domain)}</div>
      `;
      card.addEventListener('click', () => window.open(site.url, '_blank'));
      card.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); window.open(site.url, '_blank'); }
      });
      card.querySelector('.del-btn').addEventListener('click', (e) => deleteSite(site.id, e));
      grid.appendChild(card);
    });

    const addCard = document.createElement('div');
    addCard.className = 'card add-card';
    addCard.tabIndex = 0;
    addCard.innerHTML = `
      <div class="icon-box"><span class="add-plus">+</span></div>
      <div class="site-name">Ajouter site</div>
    `;
    addCard.addEventListener('click', openAddPanel);
    addCard.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openAddPanel(); }
    });
    grid.appendChild(addCard);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  loadSites();
</script>

</body>
</html>
