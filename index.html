<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trading Journal</title>
<style>
  :root{
    --bg:#f2f6fa; --panel:#ffffff; --border:#dde6ef; --border-soft:#e9f0f6;
    --blue:#2f6fed; --blue-deep:#1f4fc4; --green:#1fa971; --teal:#219e93;
    --red:#e2554a;
    --text:#101828; --muted:#5b6b7f; --muted2:#95a3b5;
    --mono:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',Consolas,monospace;
    --sans:-apple-system,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;
    --shadow:0 2px 10px rgba(31,79,196,0.06), 0 1px 2px rgba(16,24,40,0.04);
    --shadow-hover:0 8px 24px rgba(31,79,196,0.12), 0 2px 6px rgba(16,24,40,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding:24px 16px 80px;}
  .wrap{max-width:940px;margin:0 auto;}
  h1{font-size:25px;font-weight:800;margin:2px 0 0;letter-spacing:-0.01em;color:#0b1a33;}
  .eyebrow{font-size:11px;letter-spacing:.08em;color:var(--teal);text-transform:uppercase;font-family:var(--sans);font-weight:700;}
  .top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:14px;
    animation:fadeDown .5s ease both;}
  .balance{text-align:left;font-family:var(--sans);}
  .balance .num{font-size:28px;font-weight:800;transition:color .3s ease;font-family:var(--mono);}
  .balance .lbl{font-size:11px;color:var(--muted);}
  .divider{height:2px;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--teal),transparent);margin:14px 0 24px;}
  .panel{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;
    box-shadow:var(--shadow); transition:box-shadow .25s ease, transform .25s ease;
    animation:fadeUp .45s ease both;
  }
  .panel:hover{box-shadow:var(--shadow-hover);}
  .panel-title{font-size:13px;color:var(--muted);font-family:var(--sans);letter-spacing:.02em;margin-bottom:14px;text-transform:uppercase;font-weight:700;}
  .grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px 17px;flex:1 1 140px;min-width:135px;
    box-shadow:var(--shadow); transition:transform .2s ease, box-shadow .2s ease;
    animation:fadeUp .45s ease both;
  }
  .card:hover{transform:translateY(-3px); box-shadow:var(--shadow-hover); border-color:var(--blue);}
  .card .l{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-family:var(--sans);font-weight:700;}
  .card .v{font-size:23px;font-weight:800;font-family:var(--mono);margin-top:5px;color:#0b1a33;}
  .card .s{font-size:11px;color:var(--muted2);margin-top:2px;}
  .green{color:var(--green);} .red{color:var(--red);} .blue{color:var(--blue);} .teal{color:var(--teal);}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:12px;align-items:end;}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-family:var(--sans);text-transform:uppercase;letter-spacing:.03em;font-weight:700;}
  input,select,textarea{
    width:100%;background:#f8fafc;border:1.5px solid var(--border);color:var(--text);
    border-radius:9px;padding:9px 10px;font-size:14px;font-family:var(--sans);font-variant-numeric:tabular-nums;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,111,237,0.12);}
  textarea{resize:vertical;min-height:40px;font-family:var(--sans);}
  .full{grid-column:1/-1;}
  button{
    cursor:pointer;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;
    font-family:var(--sans); transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  }
  button:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;box-shadow:0 4px 14px rgba(47,111,237,0.28);}
  .btn-primary:hover{box-shadow:0 6px 18px rgba(47,111,237,0.38); transform:translateY(-1px);}
  .btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
  .btn-ghost:hover{border-color:var(--red);color:var(--red);}
  .btn-danger{background:transparent;border:1.5px solid #f3cfca;color:var(--red);padding:5px 10px;font-size:11px;border-radius:7px;}
  .btn-danger:hover{background:#fdf1ef;}
  .row-actions{display:flex;gap:10px;margin-top:4px;}
  table{width:100%;border-collapse:collapse;font-size:13px;font-family:var(--sans);}
  th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;padding:8px;border-bottom:2px solid var(--border);font-family:var(--sans);}
  td{padding:9px 8px;border-bottom:1px solid var(--border-soft);white-space:nowrap;}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  tr{transition:background .15s ease;}
  tr:hover td{background:#f4f8fd;}
  .dir-buy{color:var(--green);font-weight:700;} .dir-sell{color:var(--red);font-weight:700;}
  .empty{text-align:center;color:var(--muted2);padding:36px 10px;font-size:13px;}
  .table-scroll{overflow-x:auto;}
  .note-cell{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;
    padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;opacity:0;
    transition:opacity .25s ease, transform .25s ease;pointer-events:none;z-index:50;
    box-shadow:0 8px 24px rgba(31,79,196,0.28);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .settings-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .loading{text-align:center;padding:70px 10px;color:var(--muted);font-family:var(--sans);font-size:13px;}
  svg{display:block;width:100%;height:auto;}
  .foot-note{font-size:11.5px;color:var(--muted2);margin-top:6px;line-height:1.6;}
  .bar-wrap{height:7px;background:var(--border-soft);border-radius:5px;margin-top:7px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--teal));transition:width .6s ease;}

  .period-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .period-btn{background:#f4f8fd;border:1.5px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:700;}
  .period-btn:hover{border-color:var(--blue);color:var(--blue-deep);}
  .period-btn.active{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(47,111,237,0.25);}

  .eq-custom-row{display:flex;gap:10px;align-items:end;margin-top:12px;flex-wrap:wrap;}
  .eq-custom-row > div{min-width:140px;}
  .eq-tooltip{
    position:absolute;pointer-events:none;background:#0b1a33;color:#fff;padding:6px 10px;border-radius:8px;
    font-size:11.5px;opacity:0;transition:opacity .12s ease;box-shadow:0 6px 16px rgba(11,26,51,0.28);z-index:5;
  }
  .eq-tt-label{font-weight:700;font-size:9.5px;opacity:.75;text-transform:uppercase;letter-spacing:.03em;}
  .eq-tt-val{font-family:var(--mono);font-weight:800;font-size:13px;margin-top:2px;}

  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cal-toggle{display:flex;gap:6px;background:#f0f4f9;border-radius:20px;padding:3px;}
  .cal-mode-btn{background:transparent;border:none;color:var(--muted);padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;}
  .cal-mode-btn.active{background:#fff;color:var(--blue-deep);box-shadow:0 1px 4px rgba(16,24,40,0.12);}
  .cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
  .cal-nav-btn{padding:6px 14px;font-size:15px;line-height:1;border-radius:8px;}
  .cal-label{font-size:15px;font-weight:800;color:#0b1a33;min-width:140px;text-align:center;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:10.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;text-align:center;padding-bottom:4px;letter-spacing:.03em;}
  .cal-cell{
    border-radius:10px;padding:8px 6px;min-height:64px;font-size:11px;
    display:flex;flex-direction:column;gap:2px;transition:transform .15s ease, box-shadow .15s ease;
    border:1px solid var(--border-soft);
  }
  .cal-cell:not(.cal-muted):hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
  .cal-day{font-size:11px;font-weight:700;color:var(--muted2);}
  .cal-pl{font-family:var(--mono);font-weight:800;font-size:12.5px;font-variant-numeric:tabular-nums;}
  .cal-count{font-size:10px;opacity:.85;}
  .cal-empty{background:#f7f9fc;}
  .cal-empty .cal-day{color:var(--muted2);}
  .cal-muted{background:transparent;border-color:transparent;opacity:.35;}
  .cal-win{background:linear-gradient(155deg,#e5f7ee,#d3f0e2);border-color:#bfe8d3;}
  .cal-win .cal-day,.cal-win .cal-pl{color:#137a4c;}
  .cal-win .cal-count{color:#1c9060;}
  .cal-loss{background:linear-gradient(155deg,#fdeceb,#fbdcda);border-color:#f6c6c2;}
  .cal-loss .cal-day,.cal-loss .cal-pl{color:#a4362b;}
  .cal-loss .cal-count{color:#c14d40;}
  .cal-year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .cal-month-cell{
    border-radius:12px;padding:16px 12px;min-height:90px;
    display:flex;flex-direction:column;gap:4px;justify-content:center;align-items:center;text-align:center;
    border:1px solid var(--border-soft);transition:transform .15s ease, box-shadow .15s ease;
  }
  .cal-month-cell:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
  .cal-month-name{font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.03em;}
  @media(max-width:560px){ .cal-year-grid{grid-template-columns:repeat(3,1fr);} .cal-cell{min-height:52px;padding:6px 4px;} .cal-count{display:none;} }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){ .balance{text-align:right;} .top{flex-direction:column;align-items:flex-start;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">Personal Trading Journal</div>
      <h1>Trading Dashboard</h1>
    </div>
    <div class="balance">
      <div class="lbl">Balance</div>
      <div class="num" id="balanceNum">--</div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="app"><div class="loading">Loading your data...</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const state = { startingBalance: 27, trades: [] };
let calView = { mode: 'month', year: new Date().getFullYear(), month: new Date().getMonth() };
let periodView = { key: '30d' };
let equityView = { key: 'all', customStart: '', customEnd: '' };

async function loadData(){
  try{
    const res = await window.storage.get('journal-data', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.startingBalance = typeof parsed.startingBalance === 'number' ? parsed.startingBalance : 27;
      state.trades = Array.isArray(parsed.trades) ? parsed.trades : [];
    }
  }catch(e){
    // no existing data yet, keep defaults
  }
  render();
}

async function saveData(showToast){
  try{
    const result = await window.storage.set('journal-data', JSON.stringify(state), false);
    if(!result) throw new Error('no result');
    if(showToast) toast('Saved ✓');
  }catch(e){
    toast('Could not save, try again');
  }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1700);
}

function uid(){ return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function computeStats(){
  const trades = state.trades.slice().sort(function(a,b){ return (a.date+a.time).localeCompare(b.date+b.time); });
  let running = state.startingBalance, peak = state.startingBalance;
  const equity = [{ label: 'Start', balance: running, dd: 0 }];
  trades.forEach(function(t,i){
    running += Number(t.pl);
    peak = Math.max(peak, running);
    equity.push({ label: '#'+(i+1), balance: +running.toFixed(2), dd: +(running-peak).toFixed(2) });
  });
  const wins = trades.filter(function(t){ return Number(t.pl) > 0; });
  const losses = trades.filter(function(t){ return Number(t.pl) < 0; });
  const grossProfit = wins.reduce(function(s,t){ return s+Number(t.pl); },0);
  const grossLoss = Math.abs(losses.reduce(function(s,t){ return s+Number(t.pl); },0));
  const winRate = trades.length ? (wins.length/trades.length*100) : 0;
  const avgWin = wins.length ? grossProfit/wins.length : 0;
  const avgLoss = losses.length ? grossLoss/losses.length : 0;
  const profitFactor = grossLoss ? grossProfit/grossLoss : (grossProfit>0 ? Infinity : 0);
  const netPL = grossProfit - grossLoss;
  const maxDD = equity.length ? Math.min.apply(null, equity.map(function(e){ return e.dd; })) : 0;
  const maxDDPct = peak ? (maxDD/peak*100) : 0;

  let curType=null, curLen=0, maxWinStreak=0, maxLossStreak=0;
  trades.forEach(function(t){
    const type = Number(t.pl) > 0 ? 'w' : 'l';
    if(type===curType) curLen++; else { curType=type; curLen=1; }
    if(type==='w') maxWinStreak=Math.max(maxWinStreak,curLen); else maxLossStreak=Math.max(maxLossStreak,curLen);
  });

  const buys = trades.filter(function(t){ return t.direction==='buy'; });
  const sells = trades.filter(function(t){ return t.direction==='sell'; });
  const buyPL = buys.reduce(function(s,t){ return s+Number(t.pl); },0);
  const sellPL = sells.reduce(function(s,t){ return s+Number(t.pl); },0);
  const buyWinRate = buys.length ? buys.filter(function(t){ return Number(t.pl)>0; }).length/buys.length*100 : 0;
  const sellWinRate = sells.length ? sells.filter(function(t){ return Number(t.pl)>0; }).length/sells.length*100 : 0;

  return { trades: trades, equity: equity, wins: wins, losses: losses, grossProfit: grossProfit,
    grossLoss: grossLoss, winRate: winRate, avgWin: avgWin, avgLoss: avgLoss,
    profitFactor: profitFactor, netPL: netPL, maxDD: maxDD, maxDDPct: maxDDPct,
    maxWinStreak: maxWinStreak, maxLossStreak: maxLossStreak, buys: buys, sells: sells,
    buyPL: buyPL, sellPL: sellPL, buyWinRate: buyWinRate, sellWinRate: sellWinRate,
    finalBalance: running };
}

function fmt(n){ return (n<0?'-$':'$') + Math.abs(n).toFixed(2); }

function render(){
  const s = computeStats();
  document.getElementById('balanceNum').textContent = '$'+s.finalBalance.toFixed(2);
  document.getElementById('balanceNum').className = 'num ' + (s.finalBalance >= state.startingBalance ? 'green':'red');

  const app = document.getElementById('app');

  const emptyMsg = 'No trades yet. Add your first trade above to get started.';
  const historyBody = s.trades.length ? renderTable(s.trades) : ('<div class="empty">' + emptyMsg + '</div>');

  app.innerHTML =
    '<div class="panel">' +
      '<div class="panel-title">Add New Trade</div>' +
      '<div id="tradeForm" class="field-grid">' +
        '<div><label>Date</label><input type="date" id="f-date" value="' + todayStr() + '"/></div>' +
        '<div><label>Time</label><input type="time" id="f-time" value="' + nowStr() + '"/></div>' +
        '<div><label>Symbol</label><input type="text" id="f-symbol" value="XAUUSD"/></div>' +
        '<div><label>Direction</label>' +
          '<select id="f-direction">' +
            '<option value="buy">Buy</option>' +
            '<option value="sell" selected>Sell</option>' +
          '</select>' +
        '</div>' +
        '<div><label>Lot Size</label><input type="number" step="0.01" id="f-lot" value="0.01"/></div>' +
        '<div><label>Entry Price</label><input type="number" step="0.01" id="f-entry" placeholder="4000.00"/></div>' +
        '<div><label>Exit Price</label><input type="number" step="0.01" id="f-exit" placeholder="4005.00"/></div>' +
        '<div><label>P/L ($)</label><input type="number" step="0.01" id="f-pl" placeholder="5.00"/></div>' +
        '<div class="full"><label>Notes (setup, reason for entry...)</label><textarea id="f-notes" placeholder="e.g. entered at daily support, RSI oversold..."></textarea></div>' +
        '<div class="full row-actions">' +
          '<button type="button" class="btn-primary" id="addBtn">+ Add Trade</button>' +
          '<button type="button" class="btn-ghost" id="calcBtn">Estimate P/L (XAUUSD)</button>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="grid">' +
      statCard('Win Rate', s.winRate.toFixed(0)+'%', s.wins.length+'W / '+s.losses.length+'L', s.winRate>=50?'green':'red') +
      statCard('Profit Factor', isFinite(s.profitFactor)?s.profitFactor.toFixed(2):'∞', s.profitFactor>=1.5?'strong':(s.profitFactor>=1?'okay':'needs work'), s.profitFactor>=1.2?'green':'red') +
      statCard('Avg Win / Loss', fmt(s.avgWin)+' / '+fmt(-s.avgLoss), s.avgLoss? ('ratio '+(s.avgWin/s.avgLoss).toFixed(2)) : '') +
      statCard('Max Drawdown', fmt(Math.abs(s.maxDD)), Math.abs(s.maxDDPct).toFixed(0)+'% from peak','red') +
    '</div>' +
    '<div class="grid">' +
      statCard('Net P/L', fmt(s.netPL), '', s.netPL>=0?'green':'red') +
      statCard('Total Trades', String(s.trades.length), '') +
      statCard('Max Win Streak', String(s.maxWinStreak), '','green') +
      statCard('Max Loss Streak', String(s.maxLossStreak), '', s.maxLossStreak>=3?'red':'') +
    '</div>' +

    '<div id="periodPanelWrap">' + periodPanelHTML() + '</div>' +

    '<div id="equityPanelWrap">' + equityPanelHTML() + '</div>' +

    '<div class="panel">' +
      '<div class="panel-title">Buy vs Sell</div>' +
      '<div style="display:flex;gap:26px;flex-wrap:wrap;">' +
        '<div style="flex:1;min-width:200px;">' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;">' +
            '<span>Buy (' + s.buys.length + ')</span><span class="' + (s.buyPL>=0?'green':'red') + '">' + fmt(s.buyPL) + '</span>' +
          '</div>' +
          '<div class="bar-wrap"><div class="bar-fill" style="width:' + s.buyWinRate + '%;"></div></div>' +
          '<div class="foot-note">' + s.buyWinRate.toFixed(0) + '% win rate</div>' +
        '</div>' +
        '<div style="flex:1;min-width:200px;">' +
          '<div style="display:flex;justify-content:space-between;font-size:13px;">' +
            '<span>Sell (' + s.sells.length + ')</span><span class="' + (s.sellPL>=0?'green':'red') + '">' + fmt(s.sellPL) + '</span>' +
          '</div>' +
          '<div class="bar-wrap"><div class="bar-fill" style="width:' + s.sellWinRate + '%;"></div></div>' +
          '<div class="foot-note">' + s.sellWinRate.toFixed(0) + '% win rate</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="panel">' +
      '<div class="panel-title">P/L Per Trade</div>' +
      '<div id="plChart"></div>' +
    '</div>' +

    '<div class="panel">' +
      '<div class="panel-title">History (' + s.trades.length + ' trades)</div>' +
      '<div class="table-scroll">' + historyBody + '</div>' +
    '</div>' +

    '<div id="calendarPanelWrap">' + calendarPanelHTML() + '</div>' +

    '<div class="panel">' +
      '<div class="panel-title">Settings</div>' +
      '<div class="settings-row">' +
        '<div><label>Starting Balance ($)</label><input type="number" step="0.01" id="startBalInput" value="' + state.startingBalance + '"/></div>' +
        '<button class="btn-primary" id="saveBalBtn">Save</button>' +
        '<button class="btn-ghost" id="resetBtn" style="margin-left:auto;">Clear All Trades</button>' +
      '</div>' +
    '</div>';

  document.getElementById('addBtn').addEventListener('click', onAddTrade);
  document.getElementById('calcBtn').addEventListener('click', onCalcPL);
  document.getElementById('saveBalBtn').addEventListener('click', onSaveBalance);
  document.getElementById('resetBtn').addEventListener('click', onResetAll);
  const delButtons = app.querySelectorAll('[data-del]');
  for(let i=0;i<delButtons.length;i++){
    delButtons[i].addEventListener('click', function(){ onDeleteTrade(this.getAttribute('data-del')); });
  }

  attachPeriodListeners();
  attachCalendarListeners();
  attachEquityListeners();

  drawEquityChart(computeEquitySeries());
  drawPlChart(s);
}

function statCard(label,value,sub,accentClass){
  return '<div class="card">' +
    '<div class="l">' + label + '</div>' +
    '<div class="v ' + (accentClass||'') + '">' + value + '</div>' +
    (sub ? ('<div class="s">' + sub + '</div>') : '') +
  '</div>';
}

function renderTable(trades){
  const sorted = trades.slice().sort(function(a,b){ return (b.date+b.time).localeCompare(a.date+a.time); });
  const rows = sorted.map(function(t){
    return '<tr>' +
      '<td>' + t.date + (t.time?(' '+t.time):'') + '</td>' +
      '<td>' + t.symbol + '</td>' +
      '<td class="dir-' + t.direction + '">' + (t.direction==='buy'?'Buy':'Sell') + '</td>' +
      '<td>' + t.lot + '</td>' +
      '<td>' + (t.entry||'-') + '</td>' +
      '<td>' + (t.exit||'-') + '</td>' +
      '<td class="num ' + (Number(t.pl)>=0?'green':'red') + '">' + fmt(Number(t.pl)) + '</td>' +
      '<td class="note-cell" title="' + escapeHtml(t.notes||'') + '">' + escapeHtml(t.notes||'-') + '</td>' +
      '<td><button class="btn-danger" data-del="' + t.id + '">Delete</button></td>' +
    '</tr>';
  }).join('');
  return '<table>' +
    '<thead><tr><th>Date</th><th>Symbol</th><th>Dir</th><th>Lot</th><th>Entry</th><th>Exit</th><th>P/L</th><th>Notes</th><th></th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
  '</table>';
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
  });
}

function todayStr(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off*60000);
  return local.toISOString().slice(0,10);
}
function nowStr(){
  const d = new Date();
  return d.toTimeString().slice(0,5);
}

async function onAddTrade(){
  const dateEl = document.getElementById('f-date');
  const timeEl = document.getElementById('f-time');
  const symbolEl = document.getElementById('f-symbol');
  const dirEl = document.getElementById('f-direction');
  const lotEl = document.getElementById('f-lot');
  const entryEl = document.getElementById('f-entry');
  const exitEl = document.getElementById('f-exit');
  const plEl = document.getElementById('f-pl');
  const notesEl = document.getElementById('f-notes');

  if(!plEl.value || plEl.value.trim()===''){ toast('Enter a P/L value'); plEl.focus(); return; }
  if(isNaN(parseFloat(plEl.value))){ toast('P/L must be a number'); plEl.focus(); return; }

  const trade = {
    id: uid(),
    date: dateEl.value || todayStr(),
    time: timeEl.value || nowStr(),
    symbol: (symbolEl.value || 'XAUUSD').toUpperCase(),
    direction: dirEl.value,
    lot: lotEl.value,
    entry: entryEl.value,
    exit: exitEl.value,
    pl: parseFloat(plEl.value),
    notes: notesEl.value
  };
  state.trades.push(trade);
  render();
  await saveData(true);
}

function onCalcPL(){
  const entry = parseFloat(document.getElementById('f-entry').value);
  const exit = parseFloat(document.getElementById('f-exit').value);
  const lot = parseFloat(document.getElementById('f-lot').value || '0.01');
  const dir = document.getElementById('f-direction').value;
  if(isNaN(entry) || isNaN(exit)){ toast('Enter Entry and Exit prices first'); return; }
  const diff = dir === 'buy' ? (exit-entry) : (entry-exit);
  const pl = diff * lot * 100; // standard estimate: 1 lot XAUUSD ~ 100 oz — check against your broker
  document.getElementById('f-pl').value = pl.toFixed(2);
  toast('Estimated — adjust if needed');
}

async function onDeleteTrade(id){
  state.trades = state.trades.filter(function(t){ return t.id!==id; });
  render();
  await saveData(true);
}

async function onSaveBalance(){
  const val = parseFloat(document.getElementById('startBalInput').value);
  if(isNaN(val)){ toast('Enter a valid number'); return; }
  state.startingBalance = val;
  render();
  await saveData(true);
}

async function onResetAll(){
  if(!confirm('Clear all trades? This cannot be undone.')) return;
  state.trades = [];
  render();
  await saveData(true);
}

function getEquityTrades(){
  const allSorted = state.trades.slice().sort(function(a,b){ return (a.date+a.time).localeCompare(b.date+b.time); });
  if(equityView.key === 'all'){
    return { trades: allSorted, baseBalance: state.startingBalance };
  }
  let startDate = null, endDate = null;
  if(equityView.key === 'custom'){
    startDate = equityView.customStart || null;
    endDate = equityView.customEnd || null;
  } else {
    const days = { '7d':7, '30d':30, '90d':90, '365d':365 }[equityView.key] || 30;
    const d = new Date(); d.setDate(d.getDate()-days);
    startDate = d.toISOString().slice(0,10);
  }
  let running = state.startingBalance;
  let base = state.startingBalance;
  const selected = [];
  allSorted.forEach(function(t){
    const inRange = (!startDate || t.date >= startDate) && (!endDate || t.date <= endDate);
    if(inRange){
      running += Number(t.pl);
      selected.push(t);
    } else {
      if(!startDate || t.date < startDate){
        running += Number(t.pl);
        base = running;
      } else {
        running += Number(t.pl);
      }
    }
  });
  return { trades: selected, baseBalance: base };
}

function computeEquitySeries(){
  const range = getEquityTrades();
  let running = range.baseBalance;
  const points = [{ idx:0, label:'Start', balance: +running.toFixed(2) }];
  range.trades.forEach(function(t,i){
    running += Number(t.pl);
    points.push({ idx: i+1, label: '#'+(i+1), balance: +running.toFixed(2), date: t.date, pl: Number(t.pl) });
  });
  return points;
}

function equityPanelHTML(){
  const options = [
    { key:'7d',   label:'7 Days' },
    { key:'30d',  label:'30 Days' },
    { key:'90d',  label:'3 Months' },
    { key:'365d', label:'1 Year' },
    { key:'all',  label:'All Time' },
    { key:'custom', label:'Custom' }
  ];
  const buttons = options.map(function(o){
    return '<button class="period-btn' + (equityView.key===o.key?' active':'') + '" data-eqperiod="' + o.key + '">' + o.label + '</button>';
  }).join('');
  const customRow = equityView.key === 'custom' ?
    '<div class="eq-custom-row">' +
      '<div><label>From</label><input type="date" id="eqStart" value="' + (equityView.customStart||'') + '"/></div>' +
      '<div><label>To</label><input type="date" id="eqEnd" value="' + (equityView.customEnd||'') + '"/></div>' +
      '<button type="button" class="btn-primary" id="eqApplyBtn">Apply</button>' +

  '</div>';
}

function refreshEquityPanel(){
  const wrap = document.getElementById('equityPanelWrap');
  if(!wrap) return;
  wrap.innerHTML = equityPanelHTML();
  attachEquityListeners();
  drawEquityChart(computeEquitySeries());
}

function attachEquityListeners(){
  const btns = document.querySelectorAll('[data-eqperiod]');
  for(let i=0;i<btns.length;i++){
    btns[i].addEventListener('click', function(){
      equityView.key = this.getAttribute('data-eqperiod');
      refreshEquityPanel();

function drawEquityChart(points){
  const container = document.getElementById('equityChart');
  if(!container) return;
  if(!points.length){ container.innerHTML = '<div class="empty">No trades in this period.</div>'; return; }

  const w = 860, h = 260, padLeft = 54, padRight = 18, padTop = 18, padBottom = 30;
  const vals = points.map(function(p){ return p.balance; });
  let min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  if(min === max){ min -= 1; max += 1; }
  const range = max - min;
  const n = points.length;
  const xOf = function(i){ return padLeft + (n>1 ? (i/(n-1)) : 0) * (w-padLeft-padRight); };
  const yOf = function(v){ return h-padBottom - ((v-min)/range) * (h-padTop-padBottom); };

  let path = 'M ' + xOf(0) + ' ' + yOf(vals[0]);
  for(let i=1;i<n;i++){ path += ' L ' + xOf(i) + ' ' + yOf(vals[i]); }
  const area = path + ' L ' + xOf(n-1) + ' ' + (h-padBottom) + ' L ' + xOf(0) + ' ' + (h-padBottom) + ' Z';

  const ticks = 4;
  let yLines = '', yLabels = '';
  for(let t=0;t<=ticks;t++){
    const val = min + (range*t/ticks);
    const yy = yOf(val);
    yLines += '<line x1="'+padLeft+'" y1="'+yy+'" x2="'+(w-padRight)+'" y2="'+yy+'" stroke="#eef2f7" stroke-width="1"/>';
    yLabels += '<text x="'+(padLeft-8)+'" y="'+(yy+3)+'" font-size="10" text-anchor="end" fill="#95a3b5" font-family="ui-monospace,monospace">$'+val.toFixed(0)+'</text>';
  }

  const labelStep = Math.max(1, Math.ceil(n/8));
  let xLabels = '';
  for(let i=0;i<n;i+=labelStep){
    xLabels += '<text x="'+xOf(i)+'" y="'+(h-8)+'" font-size="10" text-anchor="middle" fill="#95a3b5" font-family="ui-monospace,monospace">'+i+'</text>';
  }
  if((n-1) % labelStep !== 0){
    xLabels += '<text x="'+xOf(n-1)+'" y="'+(h-8)+'" font-size="10" text-anchor="middle" fill="#95a3b5" font-family="ui-monospace,monospace">'+(n-1)+'</text>';
  }
  const xAxisTitle = '<text x="'+(w/2)+'" y="'+(h-1)+'" font-size="10" text-anchor="middle" fill="#c3cddb" font-family="ui-monospace,monospace">TRADE #</text>';

  const dots = points.map(function(p,i){
    return '<circle cx="'+xOf(i)+'" cy="'+yOf(p.balance)+'" r="2.6" fill="#2f6fed"/>';
  }).join('');

  container.style.position = 'relative';
  container.innerHTML =
    '<svg id="eqSvg" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="cursor:crosshair;">' +
      '<defs><linearGradient id="eqFill" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0%" stop-color="#2f6fed" stop-opacity="0.16"/>' +
        '<stop offset="100%" stop-color="#219e93" stop-opacity="0"/>' +
      '</linearGradient></defs>' +
      yLines + yLabels +
      '<path d="'+area+'" fill="url(#eqFill)"/>' +
      '<path d="'+path+'" fill="none" stroke="#2f6fed" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
      dots +
      '<line id="eqGuide" x1="0" y1="'+padTop+'" x2="0" y2="'+(h-padBottom)+'" stroke="#2f6fed" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>' +
      '<circle id="eqActiveDot" cx="0" cy="0" r="4.5" fill="#2f6fed" stroke="#fff" stroke-width="2" opacity="0"/>' +
      xLabels + xAxisTitle +
    '</svg>' +
    '<div id="eqTooltip" class="eq-tooltip"></div>';

  const svg = document.getElementById('eqSvg');
  const tooltip = document.getElementById('eqTooltip');
  const guide = document.getElementById('eqGuide');
  const activeDot = document.getElementById('eqActiveDot');

  function handleMove(clientX){
    const rect = svg.getBoundingClientRect();
    if(!rect.width) return;
    const relX = clientX - rect.left;
    const scaleX = w / rect.width;
    const vbX = relX * scaleX;
    let idx = Math.round(((vbX-padLeft)/(w-padLeft-padRight)) * (n-1));
    idx = Math.max(0, Math.min(n-1, idx));
    const p = points[idx];
    const px = xOf(idx), py = yOf(p.balance);
    guide.setAttribute('x1', px); guide.setAttribute('x2', px); guide.setAttribute('opacity','1');
    activeDot.setAttribute('cx', px); activeDot.setAttribute('cy', py); activeDot.setAttribute('opacity','1');
    const label = idx===0 ? 'Start' : ('Trade #'+idx);
    tooltip.innerHTML = '<div class="eq-tt-label">'+label+'</div><div class="eq-tt-val">$'+p.balance.toFixed(2)+'</div>';
    tooltip.style.opacity = '1';
    const scale = rect.width / w;
    const leftPx = px*scale, topPx = py*scale;
    tooltip.style.left = Math.min(Math.max(leftPx-45, 0), rect.width-100) + 'px';
    tooltip.style.top = Math.max(topPx-56, 0) + 'px';
  }

  svg.addEventListener('mousemove', function(e){ handleMove(e.clientX); });
  svg.addEventListener('mouseleave', function(){
    guide.setAttribute('opacity','0');
    activeDot.setAttribute('opacity','0');
    tooltip.style.opacity = '0';
  });
  svg.addEventListener('touchmove', function(e){
    if(e.touches && e.touches[0]){ handleMove(e.touches[0].clientX); e.preventDefault(); }
  }, { passive:false });
}

function drawPlChart(s){
  const el = document.getElementById('plChart');
  if(!el) return;
  const ordered = s.trades.slice().sort(function(a,b){ return (a.date+a.time).localeCompare(b.date+b.time); });
  if(!ordered.length){ el.innerHTML = '<div class="empty">No trades to chart yet.</div>'; return; }
  const w = 860, h = 180, pad = 24, gap = 6;
  const vals = ordered.map(function(t){ return Number(t.pl); });
  const maxAbs = Math.max.apply(null, vals.map(Math.abs)) || 1;
  const zeroY = h/2;
  const barW = Math.max((w - pad*2)/vals.length - gap, 4);

  const bars = vals.map(function(v,i){
    const bh = (Math.abs(v)/maxAbs) * (h/2 - 14);
    const bx = pad + i * ((w-pad*2)/vals.length);
    const by = v >= 0 ? zeroY - bh : zeroY;
    const color = v >= 0 ? '#1fa971' : '#e2554a';
    return '<rect x="'+bx+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="2" fill="'+color+'"><title>#'+(i+1)+': $'+v.toFixed(2)+'</title></rect>';
  }).join('');

  el.innerHTML =
    '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">' +
      '<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(w-pad)+'" y2="'+zeroY+'" stroke="#c7d3e0" stroke-width="1"/>' +
      bars +
    '</svg>';
}

// ---------- Performance by Period ----------

function filterTradesByPeriod(key){
  if(key === 'all') return state.trades.slice();
  const days = { '7d':7, '30d':30, '90d':90, '365d':365 }[key] || 30;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  return state.trades.filter(function(t){ return t.date && t.date >= cutoffStr; });
}

function computePeriodStats(list){
  const wins = list.filter(function(t){ return Number(t.pl) > 0; });
  const losses = list.filter(function(t){ return Number(t.pl) < 0; });
  const grossProfit = wins.reduce(function(s,t){ return s+Number(t.pl); },0);
  const grossLoss = Math.abs(losses.reduce(function(s,t){ return s+Number(t.pl); },0));
  const netPL = grossProfit - grossLoss;
  const winRate = list.length ? (wins.length/list.length*100) : 0;
  const profitFactor = grossLoss ? grossProfit/grossLoss : (grossProfit>0 ? Infinity : 0);
  const pct = state.startingBalance ? (netPL/state.startingBalance*100) : Infinity;
  return { count:list.length, netPL:netPL, winRate:winRate, profitFactor:profitFactor, wins:wins.length, losses:losses.length, pct:pct };
}

function periodPanelHTML(){
  const list = filterTradesByPeriod(periodView.key);
  const ps = computePeriodStats(list);
  const options = [
    { key:'7d',   label:'Last 7 Days' },
    { key:'30d',  label:'Last 30 Days' },
    { key:'90d',  label:'Last 3 Months' },
    { key:'365d', label:'Last Year' },
    { key:'all',  label:'All Time' }
  ];
  const buttons = options.map(function(o){
    return '<button class="period-btn' + (periodView.key===o.key?' active':'') + '" data-period="' + o.key + '">' + o.label + '</button>';
  }).join('');
  return '<div class="panel">' +
    '<div class="panel-title">Performance by Period</div>' +
    '<div class="period-btns">' + buttons + '</div>' +
    '<div class="grid" style="margin-top:16px;margin-bottom:0;">' +
      statCard('Net P/L', fmt(ps.netPL), (isFinite(ps.pct) ? ((ps.pct>=0?'+':'') + ps.pct.toFixed(1) + '% of balance · ') : '') + ps.count + ' trades', ps.netPL>=0?'green':'red') +
      statCard('Win Rate', ps.winRate.toFixed(0)+'%', ps.wins+'W / '+ps.losses+'L', ps.winRate>=50?'green':'red') +
      statCard('Profit Factor', isFinite(ps.profitFactor)?ps.profitFactor.toFixed(2):'∞', '', ps.profitFactor>=1.2?'green':'red') +
    '</div>' +
  '</div>';
}

function refreshPeriodPanel(){
  const wrap = document.getElementById('periodPanelWrap');
  if(!wrap) return;
  wrap.innerHTML = periodPanelHTML();
  attachPeriodListeners();
}

function attachPeriodListeners(){
  const btns = document.querySelectorAll('.period-btn');
  for(let i=0;i<btns.length;i++){
    btns[i].addEventListener('click', function(){
      periodView.key = this.getAttribute('data-period');
      refreshPeriodPanel();
    });
  }
}

// ---------- Performance Calendar ----------

function pad2(n){ return n<10 ? ('0'+n) : (''+n); }

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function tradesByDay(){
  const map = {};
  state.trades.forEach(function(t){
    if(!t.date) return;
    if(!map[t.date]) map[t.date] = { pl:0, count:0 };
    map[t.date].pl += Number(t.pl);
    map[t.date].count++;
  });
  return map;
}

function tradesByMonth(year){
  const map = {};
  state.trades.forEach(function(t){
    if(!t.date) return;
    const parts = t.date.split('-');
    if(parseInt(parts[0],10) !== year) return;
    const m = parseInt(parts[1],10) - 1;
    if(!map[m]) map[m] = { pl:0, count:0 };
    map[m].pl += Number(t.pl);
    map[m].count++;
  });
  return map;
}

function calLabelText(){
  return calView.mode === 'month' ? (MONTH_NAMES[calView.month] + ' ' + calView.year) : String(calView.year);
}

function monthGridHTML(){
  const year = calView.year, month = calView.month;
  const dayMap = tradesByDay();
  const firstDay = new Date(year, month, 1);
  const startIdx = (firstDay.getDay()+6)%7; // Monday=0
  const totalDays = new Date(year, month+1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const cells = [];
  for(let i=startIdx-1;i>=0;i--){ cells.push({ day: prevMonthDays-i, muted:true }); }
  for(let d=1; d<=totalDays; d++){
    const dateStr = year+'-'+pad2(month+1)+'-'+pad2(d);
    cells.push({ day:d, muted:false, data: dayMap[dateStr] });
  }
  let nextDay = 1;
  while(cells.length % 7 !== 0){ cells.push({ day: nextDay++, muted:true }); }

  const dow = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = '<div class="cal-grid">';
  dow.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });
  cells.forEach(function(c){
    let cls = 'cal-cell';
    let inner = '<div class="cal-day">'+c.day+'</div>';
    if(c.muted){
      cls += ' cal-muted';
    } else if(c.data && c.data.count){
      cls += c.data.pl >= 0 ? ' cal-win' : ' cal-loss';
      inner += '<div class="cal-pl">'+fmt(c.data.pl)+'</div>';
      inner += '<div class="cal-count">'+c.data.count+' trade'+(c.data.count>1?'s':'')+'</div>';
    } else {
      cls += ' cal-empty';
    }
    html += '<div class="'+cls+'">'+inner+'</div>';
  });
  html += '</div>';
  return html;
}

function yearGridHTML(){
  const year = calView.year;
  const monthMap = tradesByMonth(year);
  let html = '<div class="cal-year-grid">';
  for(let m=0;m<12;m++){
    const data = monthMap[m];
    let cls = 'cal-month-cell';
    let inner = '<div class="cal-month-name">'+MONTH_NAMES[m].slice(0,3)+'</div>';
    if(data && data.count){
      cls += data.pl >= 0 ? ' cal-win' : ' cal-loss';
      inner += '<div class="cal-pl">'+fmt(data.pl)+'</div>';
      inner += '<div class="cal-count">'+data.count+' trade'+(data.count>1?'s':'')+'</div>';
    } else {
      cls += ' cal-empty';
    }
    html += '<div class="'+cls+'">'+inner+'</div>';
  }
  html += '</div>';
  return html;
}

function calendarGridHTML(){
  return calView.mode === 'year' ? yearGridHTML() : monthGridHTML();
}

function calendarPanelHTML(){
  return '<div class="panel">' +
    '<div class="cal-head">' +
      '<div class="panel-title" style="margin-bottom:0;">Performance Calendar</div>' +
      '<div class="cal-toggle">' +
        '<button class="cal-mode-btn' + (calView.mode==='month'?' active':'') + '" id="calModeMonth">Month</button>' +
        '<button class="cal-mode-btn' + (calView.mode==='year'?' active':'') + '" id="calModeYear">Year</button>' +
      '</div>' +
    '</div>' +
    '<div class="cal-nav">' +
      '<button class="btn-ghost cal-nav-btn" id="calPrev">‹</button>' +
      '<div class="cal-label" id="calLabel">' + calLabelText() + '</div>' +
      '<button class="btn-ghost cal-nav-btn" id="calNext">›</button>' +
    '</div>' +
    '<div id="calGrid">' + calendarGridHTML() + '</div>' +
  '</div>';
}

function updateCalendarView(){
  const label = document.getElementById('calLabel');
  const grid = document.getElementById('calGrid');
  if(label) label.textContent = calLabelText();
  if(grid) grid.innerHTML = calendarGridHTML();
}

function refreshCalendarPanel(){
  const wrap = document.getElementById('calendarPanelWrap');
  if(!wrap) return;
  wrap.innerHTML = calendarPanelHTML();
  attachCalendarListeners();
}

function attachCalendarListeners(){
  const prevBtn = document.getElementById('calPrev');
  const nextBtn = document.getElementById('calNext');
  const modeMonthBtn = document.getElementById('calModeMonth');
  const modeYearBtn = document.getElementById('calModeYear');
  if(prevBtn) prevBtn.addEventListener('click', function(){
    if(calView.mode === 'month'){
      calView.month--; if(calView.month<0){ calView.month=11; calView.year--; }
    } else { calView.year--; }
    updateCalendarView();
  });
  if(nextBtn) nextBtn.addEventListener('click', function(){
    if(calView.mode === 'month'){
      calView.month++; if(calView.month>11){ calView.month=0; calView.year++; }
    } else { calView.year++; }
    updateCalendarView();
  });
  if(modeMonthBtn) modeMonthBtn.addEventListener('click', function(){ calView.mode='month'; refreshCalendarPanel(); });
  if(modeYearBtn) modeYearBtn.addEventListener('click', function(){ calView.mode='year'; refreshCalendarPanel(); });
}

loadData();
